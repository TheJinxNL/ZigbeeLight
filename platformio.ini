; ─────────────────────────────────────────────────────────────────────────────
;  Zigbee WS2812B Light Strip — ESP32-H2 (Arduino framework)
; ─────────────────────────────────────────────────────────────────────────────
[env:esp32h2]
; The official platformio/espressif32 platform does not include ESP32-H2 boards.
; pioarduino/platform-espressif32 tracks Espressif's Arduino core 3.x and
; provides the esp32-h2-devkitm-1 board definition with full Zigbee support.
platform          = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board             = esp32-h2-devkitm-1
framework         = arduino

; End Device mode
board_build.zigbee_mode = ed

; Explicit Zigbee partition table (nvs + ota + app0/1 + zb_storage + zb_fct).
; board_build.zigbee_mode alone does not inject the partition table in all
; platform versions, causing the "Failed to find zb_storage partition" panic.
board_build.partitions  = partitions.csv
board_build.flash_size  = 4MB

build_flags =
    -DZIGBEE_MODE_ED                     ; required by Zigbee.h — end device mode
    -DARDUINO_USB_CDC_ON_BOOT=1         ; route Serial → USB CDC (required on ESP32-H2)
    -DARDUINO_USB_MODE=1                ; enable TinyUSB stack

lib_deps =
    fastled/FastLED @ ^3.9.0    ; WS2812B control

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, default
upload_speed    = 921600

; Erase NVS before each upload while developing so stale network credentials
; do not prevent re-pairing.  Comment out once the device is in production.
upload_resetmethod = nodemcu
